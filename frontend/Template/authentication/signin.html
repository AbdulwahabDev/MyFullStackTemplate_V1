                <script>

                  document.querySelector('#password_txt,#username_txt').addEventListener('keypress', function (e) {
                    if (e.key === 'Enter') {
                      SignIn();
                    }
                  });
                  function SignIn() {

                    var settings = {
                                    "url": Auth_host_Url+"/users/login",
                                    "method": "POST",
                                    "timeout": 0,
                                    xhrFields: { withCredentials: true }, 
                                    "headers": {
                                      "Content-Type": "application/json",
                                      "Accept": "application/json",
                                    },
                                    "data": JSON.stringify({
                                      "username": $('#username_txt').val(),
                                      "password": $('#password_txt').val()
                                    }),
                                  };
 

                    $.ajax(settings).done(function (response) {
                       
                      // debugger
                      document.cookie = `c_token=${response['access_token']}`;
                      window.location = '/';
                    }).fail(function (response) {
                       
                      Swal.fire({
                        title: '<strong> بيانات دخول غير صحيحة  </u></strong>',
                        // text:'',
                        icon: 'error',
                        html: `${response['responseText']}  <br>  يرجى التواصل مع عبدالوهاب الويبان لإعادة تعيين المستخدم او انشائه 
                              <br> aalweban@elm.sa  ` ,
                        showCloseButton: false,
                        showCancelButton: false,
                        focusConfirm: true,
                        cancelButtonColor: "#d33",
                        confirmButtonColor: "#3085d6",
                        confirmButtonText: 'حسناً ',
                        // cancelButtonText:
                        //   ' إلغاء  ', 
                      })
                    });


                  }

                </script>
